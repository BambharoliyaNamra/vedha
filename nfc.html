<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vedha Quick Connect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <!-- MAIN CARD -->
    <div
      class="bg-white w-full max-w-sm sm:max-w-md md:max-w-lg lg:max-w-xl xl:max-w-2xl rounded-3xl shadow-xl flex flex-col justify-between p-5 sm:p-6 md:p-8"
    >
      <!-- TOP -->
      <div class="text-center">
        <img src="/Logo.png" class="h-16 mx-auto mb-4" />

        <h2 class="text-lg font-semibold text-gray-800">
          Connect with Vedha Enterprises
        </h2>
      </div>

      <!-- ICON GRID -->
      <div class="grid grid-cols-2 gap-4 my-4 px-2">
        <a
          href="https://www.instagram.com/vedha.enterprises_"
          target="_blank"
          class="flex flex-col items-center justify-center bg-gray-100 rounded-2xl py-5 active:scale-95 transition"
        >
          <i class="fab fa-instagram text-3xl text-[#C13584] mb-2"></i>
          <span class="text-sm font-medium">Instagram</span>
        </a>

        <a
          href="https://www.facebook.com/share/1EMVxt53E5/"
          target="_blank"
          class="flex flex-col items-center justify-center bg-gray-100 rounded-2xl py-5 active:scale-95 transition"
        >
          <i class="fab fa-facebook text-3xl text-[#1877F2] mb-2"></i>
          <span class="text-sm font-medium">Facebook</span>
        </a>

        <a
          href="https://wa.me/919979988610?text=Hii, I want loan details."
          target="_blank"
          class="flex flex-col items-center justify-center bg-gray-100 rounded-2xl py-5 active:scale-95 transition"
        >
          <i class="fab fa-whatsapp text-3xl text-[#25D366] mb-2"></i>
          <span class="text-sm font-medium">WhatsApp</span>
        </a>

        <a
          href="tel:+919979988610"
          class="flex flex-col items-center justify-center bg-gray-100 rounded-2xl py-5 active:scale-95 transition"
        >
          <i class="fa-solid fa-phone text-2xl text-[#2c4aa3] mb-2"></i>
          <span class="text-sm font-medium">Call</span>
        </a>
      </div>

      <!-- BUTTONS (ALWAYS VISIBLE) -->
      <div class="space-y-3 px-2 pb-2">
        <a
          href="/"
          class="block text-center bg-[#2c4aa3] text-white py-3 rounded-xl font-semibold active:scale-95 transition"
        >
          Visit Website
        </a>

        <a
          href="https://wa.me/919979988610?text=Hi%20I%20want%20loan%20details"
          class="block text-center border border-[#2c4aa3] text-[#2c4aa3] py-3 rounded-xl font-semibold active:scale-95 transition"
        >
          Apply Now
        </a>
      </div>
    </div>
  </body>
</html>
